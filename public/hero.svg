<?xml version="1.0" encoding="UTF-8"?>
<!--
  Ảnh hero mặc định. Admin tải ảnh xưởng in thật lên là thay được ngay trong
  /admin/site-settings — file này chỉ để website không vỡ ở lần deploy đầu.

  Nội dung: một tờ in đang được canh trên bàn, có dấu bế bốn góc và dải kiểm màu
  CMYK — đúng thứ nhìn thấy ở bất kỳ xưởng in nào.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Tờ in với dấu bế và dải kiểm màu CMYK">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F4F5F7" />
      <stop offset="1" stop-color="#E8EAEE" />
    </linearGradient>
    <linearGradient id="sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" />
      <stop offset="1" stop-color="#F7F8FA" />
    </linearGradient>
  </defs>

  <rect width="800" height="800" fill="url(#bg)" />

  <!-- Lưới bình bài -->
  <g stroke="#101114" stroke-width="1" opacity="0.05">
    <path d="M0 100H800M0 200H800M0 300H800M0 400H800M0 500H800M0 600H800M0 700H800" />
    <path d="M100 0V800M200 0V800M300 0V800M400 0V800M500 0V800M600 0V800M700 0V800" />
  </g>

  <!-- Tờ in -->
  <g transform="rotate(-4 400 400)">
    <rect x="150" y="150" width="500" height="500" rx="4" fill="url(#sheet)" stroke="#101114" stroke-opacity="0.1" />

    <!-- Dấu bế bốn góc -->
    <g stroke="#101114" stroke-opacity="0.45" stroke-width="1.5">
      <path d="M182 150V126M150 182H126M618 150V126M650 182H674M182 650V674M150 618H126M618 650V674M650 618H674" />
    </g>

    <!-- Dấu căn màu -->
    <g transform="translate(400 178)">
      <circle r="9" fill="none" stroke="#101114" stroke-opacity="0.3" stroke-width="1.5" />
      <path d="M0 -15V15M-15 0H15" stroke="#101114" stroke-opacity="0.45" stroke-width="1.5" />
    </g>

    <!-- Nội dung tờ in: khối tiêu đề và dòng chữ giả lập -->
    <rect x="200" y="235" width="180" height="180" rx="6" fill="#0057FF" opacity="0.9" />
    <circle cx="345" cy="290" r="42" fill="#EC008C" opacity="0.85" style="mix-blend-mode:multiply" />

    <g fill="#101114" opacity="0.16">
      <rect x="200" y="445" width="400" height="16" rx="4" />
      <rect x="200" y="479" width="330" height="16" rx="4" />
      <rect x="200" y="513" width="370" height="16" rx="4" />
      <rect x="200" y="547" width="220" height="16" rx="4" />
    </g>

    <!-- Dải kiểm màu CMYK -->
    <g>
      <rect x="420" y="235" width="45" height="45" fill="#00AEEF" />
      <rect x="465" y="235" width="45" height="45" fill="#EC008C" />
      <rect x="510" y="235" width="45" height="45" fill="#FFF200" />
      <rect x="555" y="235" width="45" height="45" fill="#101114" />
      <rect x="420" y="280" width="45" height="45" fill="#00AEEF" opacity="0.5" />
      <rect x="465" y="280" width="45" height="45" fill="#EC008C" opacity="0.5" />
      <rect x="510" y="280" width="45" height="45" fill="#FFF200" opacity="0.5" />
      <rect x="555" y="280" width="45" height="45" fill="#101114" opacity="0.5" />
    </g>
  </g>
</svg>
